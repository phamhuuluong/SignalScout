server {
    listen 80;
    server_name hub.attraos.io;          # ← đổi domain anh mua

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hub.attraos.io;          # ← đổi domain anh mua

    # SSL (certbot tự fill sau khi chạy certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/hub.attraos.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.attraos.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy đến FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_cache_bypass $http_upgrade;
    }

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript;
}
